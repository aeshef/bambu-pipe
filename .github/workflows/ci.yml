name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: pip install -e "packages/bambu_pipe[dev]"
      - name: Ruff
        run: ruff check packages/bambu_pipe/src packages/voice2bambu/src tests apps examples
      - name: Ruff format
        run: ruff format --check packages/bambu_pipe/src packages/voice2bambu/src tests apps examples
      - name: Pytest
        run: pytest -q
      - name: Secret scan
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import subprocess

          patterns = [
              re.compile(r"sk-[A-Za-z0-9_-]{20,}"),
              re.compile(r"gh[opsu]_[A-Za-z0-9_]{20,}"),
              re.compile(r"BAMBU_PIPE_PRINTER_ACCESS_CODE\s*=\s*[^.\s#][^\s#]+"),
              re.compile(r"(TRIPO|OPENROUTER|API)_KEY\s*=\s*[^.\s#][^\s#]+"),
          ]
          paths = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          failures = []
          for raw_path in paths:
              path = Path(raw_path)
              if path.suffix.lower() in {".png", ".jpg", ".jpeg", ".stl", ".3mf"}:
                  continue
              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              for pattern in patterns:
                  if pattern.search(text):
                      failures.append(raw_path)
                      break
          if failures:
              raise SystemExit("Potential secrets found in: " + ", ".join(sorted(failures)))
          PY
      - name: Build bambu-pipe
        run: python -m build packages/bambu_pipe
      - name: Build voice2bambu
        run: python -m build packages/voice2bambu
      - name: Wheel install smoke
        run: |
          python -m venv /tmp/bambu-pipe-wheel-smoke
          /tmp/bambu-pipe-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/bambu-pipe-wheel-smoke/bin/python -m pip install packages/bambu_pipe/dist/bambu_pipe-*.whl
          cd /tmp
          /tmp/bambu-pipe-wheel-smoke/bin/python - <<'PY'
          from bambu_pipe.config import Settings

          profiles = Settings().resolved_profiles_dir
          assert (profiles / "profiles.json").is_file(), profiles
          print(f"profiles ok: {profiles}")
          PY
      - name: Docker build smoke
        if: matrix.python-version == '3.12'
        run: docker build -f docker/Dockerfile.api .
