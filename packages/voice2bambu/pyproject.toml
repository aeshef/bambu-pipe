[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "voice2bambu"
version = "0.1.0"
description = "Telegram voice adapter for bambu-pipe"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "bambu-pipe contributors" }]
dependencies = [
    "bambu-pipe",
    "httpx>=0.27",
    "pydantic-settings>=2.2",
    "python-telegram-bot>=21.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/voice2bambu"]
