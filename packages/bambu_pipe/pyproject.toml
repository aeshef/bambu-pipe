[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bambu-pipe"
version = "0.2.0"
description = "Local-first Python toolkit for Bambu Lab print automation"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "bambu-pipe contributors" }]
keywords = ["3d-printing", "bambu-lab", "orca-slicer", "automation"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Printing",
]
dependencies = [
    "aiosqlite>=0.20",
    "paho-mqtt>=2.0",
    "platformdirs>=4.0",
    "pydantic>=2.5",
    "pydantic-settings>=2.2",
    "trimesh>=4.0",
    "typer>=0.12",
    "rich>=13.0",
]

[project.urls]
Homepage = "https://github.com/aeshef/bambu-pipe"
Documentation = "https://github.com/aeshef/bambu-pipe#readme"
Issues = "https://github.com/aeshef/bambu-pipe/issues"
Repository = "https://github.com/aeshef/bambu-pipe"

[project.optional-dependencies]
api = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "python-multipart>=0.0.9",
]
tripo = [
    "httpx>=0.27",
]
all = [
    "bambu-pipe[api,tripo]",
]
dev = [
    "bambu-pipe[api,tripo]",
    "build>=1.2",
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
]

[project.scripts]
bambu-pipe = "bambu_pipe.cli.main:app"

[tool.hatch.build.targets.wheel]
packages = ["src/bambu_pipe"]

[tool.hatch.build.targets.sdist]
only-include = ["src/bambu_pipe", "README.md"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["../../tests"]
